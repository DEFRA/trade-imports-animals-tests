################################################################################
# Docker Compose stack for Trade Imports Animals journey tests.
# This file defines the infrastructure used locally and in CI to run
# end-to-end Playwright tests against the Trade Imports Animals frontend
# and backend services.
#
# It provides infrastructure comparable to the real environment:
#   - mongodb
#   - redis
#   - localstack (s3, sqs, sns)
#
# Both mongodb and localstack have init scripts included for setting up
# resources on startup. These scripts are in docker/scripts.
#
# The Trade Imports Animals frontend and backend images are pulled from
# Docker Hub (defradigital/*) and configured using .env files under
# docker/config/. Services can reference each other by container name,
# for example:
#   - http://trade-imports-animals-frontend:3000/
#   - http://trade-imports-animals-backend:8085/

services:

################################################################################
# MongoDB
# https://hub.docker.com/_/mongo/
################################################################################
  mongodb:
    image: mongo:6
    volumes:
      - ./docker/scripts/mongodb:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.hello().ok"]
      interval: 5s
      start_period: 5s
      retries: 3

################################################################################
# Localstack
# https://hub.docker.com/r/localstack/localstack/
################################################################################
  localstack:
    image: localstack/localstack:3.2.0
    environment:
      - LOCALSTACK_HOST=127.0.0.1
      - SERVICES=s3,sqs,sns,dynamodb
      - LS_LOG=WARN
    env_file:
      - ./docker/config/defaults.env
    volumes:
      - ./docker/scripts/localstack:/etc/localstack/init/ready.d
    healthcheck:
      test: ["CMD", "curl", "localhost:4566"]
      interval: 5s
      start_period: 5s
      retries: 3

################################################################################
# Redis
# https://hub.docker.com/_/redis/
################################################################################
  redis:
    image: redis:7
    restart: always
    healthcheck:
      test: [ "CMD", "redis-cli", "PING" ]
      interval: 5s
      start_period: 2s
      retries: 5

################################################################################
# Trade Imports Animals frontend
# https://hub.docker.com/r/defradigital/trade-imports-animals-frontend/
################################################################################
  trade-imports-animals-frontend:
    image: defradigital/trade-imports-animals-frontend:${TRADE_IMPORTS_ANIMALS_FRONTEND:-latest}
    platform: linux/amd64
    env_file:
      - ./docker/config/defaults.env
      - ./docker/config/trade-imports-animals-frontend.env
    environment:
      - PORT=3000
    depends_on:
      trade-imports-animals-backend:
        condition: service_started
      redis:
        condition: service_healthy
    ports:
      - 3000:3000
    healthcheck:
      test: ["CMD", "curl", "http://localhost:3000/health"]
      interval: 3s
      start_period: 2s
      retries: 3

################################################################################
# Trade Imports Animals backend
# https://hub.docker.com/r/defradigital/trade-imports-animals-backend/
################################################################################
  trade-imports-animals-backend:
    image: defradigital/trade-imports-animals-backend:${TRADE_IMPORTS_ANIMALS_BACKEND:-latest}
    platform: linux/amd64
    env_file:
      - ./docker/config/defaults.env
      - ./docker/config/trade-imports-animals-backend.env
    environment:
      - PORT=8085
    depends_on:
      mongodb:
        condition: service_healthy
      localstack:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8085/health"]
      interval: 5s
      start_period: 60s
      retries: 10

################################################################################
# Playwright test runner
# https://mcr.microsoft.com/en-us/artifact/mar/playwright
################################################################################
  playwright-tests:
    image: mcr.microsoft.com/playwright:v1.58.2-jammy
    working_dir: /app
    volumes:
      - ./:/app
    environment:
      - CI=true
    profiles:
      - tests
    depends_on:
      trade-imports-animals-backend:
        condition: service_healthy
      trade-imports-animals-frontend:
        condition: service_healthy
    command: >
      bash -lc "npm ci --ignore-scripts && npm run test:github"
